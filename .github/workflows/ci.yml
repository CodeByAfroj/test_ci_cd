name: CI & Self-Healing

on:
  push:
  pull_request:

jobs:
  test-and-heal:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Tests & Capture Logs
        id: run_tests
        run: |
          pytest tests/ > test_logs.txt 2>&1 || true

          cat test_logs.txt

          if grep -iE "FAILED|ERROR collecting|Traceback" test_logs.txt; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi